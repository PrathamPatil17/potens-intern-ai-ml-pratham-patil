# Railway configuration for the BACKEND service.
# Set this file's service in Railway dashboard → Settings → Source → Root Directory = /
#
# For the FRONTEND service, set the start command manually in the Railway
# dashboard (Settings → Deploy → Start Command):
#   streamlit run ui/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "bash start_backend.sh"
healthcheckPath = "/health"
healthcheckTimeout = 180
